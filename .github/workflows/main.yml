name: Daily Zepp Steps  # 任务名称

on:
  schedule:
    - cron: '0 21 * * *'  # 每天 UTC 21:00 运行，对应北京时间 05:00
  workflow_dispatch:     # 允许手动点击运行

jobs:
  run-steps:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 云端系统
    
    steps:
      # 步骤1：把你的代码拉取到云端
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：在云端安装 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 步骤3：自动安装 requirements.txt 里的依赖包
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：读取你保存在 Secrets 里的 CONFIG 变量，并运行 main.py
      - name: Run main.py
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
        run: python main.py

      # 步骤5：随机化下次执行的分钟（避免每次都在同一分钟提交步数）
      - name: Randomize cron minute
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          # 如果没有配置 PAT，跳过 cron 随机化
          if [ -z "$PAT" ]; then
            echo "未配置 PAT Secret，跳过 cron 随机化"
            exit 0
          fi
          # 配置 git 认证（使用 PAT 才能推送回仓库）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPO_URL="https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"
          git remote set-url origin "$REPO_URL"
          # 执行 cron 随机化脚本
          source ./cron_convert.sh
          persist_execute_log "schedule" ""
          # 提交并推送变更
          git add cron_change_time .github/workflows/main.yml encrypted_tokens.data
          git diff --cached --quiet || git commit -m "chore: update cron minute [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
