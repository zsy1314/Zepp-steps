name: Daily Zepp Steps  # 任务名称

on:
  schedule:
    - cron: '0 21 * * *'  # 每天 UTC 16:00 运行，对应北京时间 00:00
  workflow_dispatch:     # 允许手动点击运行

jobs:
  run-steps:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 云端系统
    
    steps:
      # 步骤1：把你的代码拉取到云端
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：在云端安装 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 步骤3：自动安装 requirements.txt 里的依赖包
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：读取你保存在 Secrets 里的 CONFIG 变量，并运行 main.py
      - name: Run main.py
        env:
          CONFIG: ${{ secrets.CONFIG }}
        run: python main.py
