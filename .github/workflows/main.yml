name: Daily Zepp Steps  # 任务名称

on:
  schedule:
    - cron: '0 21 * * *'  # 每天 UTC 21:00 运行，对应北京时间 05:00
  workflow_dispatch:     # 允许手动点击运行

jobs:
  run-steps:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 云端系统
    
    steps:
      # 步骤1：把你的代码拉取到云端
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：在云端安装 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 步骤3：自动安装 requirements.txt 里的依赖包
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：读取你保存在 Secrets 里的 CONFIG 变量，并运行 main.py
      - name: Run main.py
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
        run: python main.py

      # 步骤5：保存执行记录和加密 token 到仓库（不修改 workflow 文件，避免 fork 仓库权限问题）
      - name: Save logs and tokens
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "未配置 PAT Secret，跳过日志保存"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPO_URL="https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"
          git remote set-url origin "$REPO_URL"
          # 记录本次执行时间
          echo "trigger by: schedule" > cron_change_time
          echo "exec time (UTC): $(TZ=UTC date '+%y-%m-%d %H:%M:%S')" >> cron_change_time
          echo "exec time (北京): $(TZ=Asia/Shanghai date '+%y-%m-%d %H:%M:%S')" >> cron_change_time
          echo "cron: 0 21 * * * (UTC) / 05:00 北京时间" >> cron_change_time
          # 提交并推送（不包含 workflow 文件，避免 fine-grained token 权限报错）
          git add cron_change_time encrypted_tokens.data
          git diff --cached --quiet || git commit -m "chore: update execution log [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
